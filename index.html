<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   
    <title>منصة الامتحانات</title>
    <link rel="icon" type="image/png" href="pngtree-graduation-cap.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .landing {
        text-align: center;
        color: white;
        max-width: 500px;
      }

      .landing .icon {
        font-size: 80px;
        margin-bottom: 20px;
      }

      .landing h1 {
        font-size: 2.5rem;
        margin-bottom: 15px;
      }

      .landing p {
        font-size: 1.2rem;
        margin-bottom: 40px;
        opacity: 0.9;
      }

      .start-btn {
        display: inline-block;
        background: white;
        color: #667eea;
        padding: 18px 50px;
        border-radius: 50px;
        font-size: 1.3rem;
        font-weight: bold;
        text-decoration: none;
        transition: transform 0.2s;
      }

      .start-btn:hover {
        transform: translateY(-3px);
      }

      /* للموبايل */
      @media (max-width: 600px) {
        .landing h1 {
          font-size: 2rem;
        }
        .landing .icon {
          font-size: 60px;
        }
      }
    </style>
  </head>
  <body>
    <div class="landing">
      <div class="icon">🎓</div>
      <h1>منصة الامتحانات</h1>
      <p>الحق ذاكر حاجة في الوقت بدل الضائع(●'◡'●)</p>
      <a href="app.html" class="start-btn"> ابدأ مذاكرة فوراا 🫵</a>
    </div>
  </body>
</html>
